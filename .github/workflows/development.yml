name: Development

on:

  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

  workflow_dispatch:

permissions:
  contents: read

jobs:

  build_and_test:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.10", 3.11, 3.12, 3.13, 3.14]
      fail-fast: false
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install dev environment
        uses: ./.github/workflows/install_dev_env
        with:
          python-version: ${{ matrix.python-version }}
          token: ${{ secrets.OAUTH_TOKEN }}
      - name: Run tests
        if: ${{ success() }}
        working-directory: ${{ github.workspace }}
        run: |
          poetry run pytest -m "not authentication and not long" --junitxml=TestResults/unittests.xml --cov=volue.mesh --cov-branch --cov-report=json:TestResults/coverage.json

      # ---- Quality Reporter ----------------------------------------------
      # Publishes test results and coverage to the Volue Grafana Code Quality
      # dashboard. Runs from a single matrix leg (3.11, matching the reporter's
      # dependency lock) and never on pull_request: this is a public repository,
      # so fork PRs must not reach for secrets (GitHub withholds them anyway).
      # Validate manually on a branch with workflow_dispatch once the secrets
      # QUALITY_REPORTER_READ_TOKEN (fine-grained PAT, Contents:Read on
      # Volue/quality-reporter only) and
      # VOLUE_PLATFORM_GRAFANA_METRICS_PUBLISHER_TOKEN are provisioned.

      - name: Check out quality reporter tooling
        if: ${{ success() && github.event_name != 'pull_request' && matrix.python-version == '3.11' }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: Volue/quality-reporter
          ref: 17eaec0120b82b3193b825d06b2c28bb5bfe79d6 # v1.0.4
          token: ${{ secrets.QUALITY_REPORTER_READ_TOKEN }}
          path: qr-tools
          persist-credentials: false

      - name: Fetch repository custom properties
        if: ${{ success() && github.event_name != 'pull_request' && matrix.python-version == '3.11' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl -s \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}" \
            > custom_properties.json
          echo "QR_PRODUCT=$(jq -r '.custom_properties.product' custom_properties.json)" >> $GITHUB_ENV
          echo "QR_PRODUCT_LINE=$(jq -r '.custom_properties.product_line' custom_properties.json)" >> $GITHUB_ENV
          echo "QR_PRODUCT_CODE=$(jq -r '.custom_properties.product_code | select(. != null) // ""' custom_properties.json)" >> $GITHUB_ENV

      - name: Upload results to quality reporter
        if: ${{ success() && github.event_name != 'pull_request' && matrix.python-version == '3.11' }}
        shell: bash
        env:
          QR_GRAFANA_USERNAME: 777544
          QR_GRAFANA_TOKEN: ${{ secrets.VOLUE_PLATFORM_GRAFANA_METRICS_PUBLISHER_TOKEN }}
          QR_GRAFANA_PUSHGATEWAY: https://quality-reporter.platform.volue.eu
          QR_REPOSITORY: ${{ github.repository }}
          QR_BRANCH: ${{ github.ref_name }}
          QR_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          QR_GIT_SHA: ${{ github.sha }}
          QR_CODE_LANG: python
          QR_REQUIRED_TESTS: "200" # TODO: tune to the real suite size
          QR_DEBUG: "true"
        run: |
          # Hash-locked install: any dependency missing from the lock or failing
          # its sha256 aborts the install.
          python -m pip install --require-hashes --no-deps -r qr-tools/requirements.txt
          python qr-tools/scripts/grafana_quality_reporter.py
