name: Install development environment
description: Workflow installs poetry, Mesh Python SDK and Mesh service

inputs:
  token:
    required: true
  python-version:
    required: true

runs:
  using: "composite"
  steps:
    - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ inputs.python-version }}

    - name: Installing poetry
      uses: abatilo/actions-poetry@1f9adef0261964471fcf93ba269e1762a33a8a26 # v2.0.0
      with:
        poetry-version: "1.8.5"

    - name: Poetry install
      run: poetry install
      shell: bash

    # Generates the protobuf/gRPC sources and creates the SDK packages
    - name: Poetry build
      run: poetry build
      shell: bash

    - name: Checkout GitHub action
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        repository: PowelAS/sme-run-mesh-service
        ref: master
        token: ${{ inputs.token }}
        path: .github/actions

    - name: Install and run Mesh server
      uses: ./.github/actions/
      id: download-mesh-server
      with:
        GITHUB_TOKEN: ${{ inputs.token }}
        MESH_SERVICE_TAG: "v2.21.0.2796"
